<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
<h1>Cool Tool!</h1>
<script>
  window.addEventListener('message', (e) => {
    console.log(e);
    const [port2] = e.ports;
    const t = e?.data?.token;
    if (t) {
      console.log({ token: t, project: e.data.project || e.data.context });
    }
    document.body.innerHTML += '<p>Got the token....</p>';

    // Send button
    const send = document.createElement('button');
    send.textContent = `Send HTML`;
    send.addEventListener('click', () => {
      port2.postMessage({ action: 'sendHTML', details: '<script>alert("Bang!");</script><h1>bang!</h1>' });
    });
    document.body.append(send);
  });

</script>
</body>
</html>
