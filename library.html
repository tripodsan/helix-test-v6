<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
<h1>Cool Tool!</h1>
<script>
  window.addEventListener('message', (e) => {
    const t = e?.data?.token;
    if (t) {
      console.log({ token: t, project: e.data.project || e.data.context });
    }
    document.body.innerHTML += '<p>Got the token....</p>';
  });
</script>
</body>
</html>
